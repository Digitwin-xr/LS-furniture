<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS Lifestyle — 3D Model Matcher</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header h1 span {
            color: var(--accent);
        }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar .bar {
            width: 200px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar .bar-fill {
            height: 100%;
            background: var(--green);
            transition: width .3s;
        }

        .progress-bar .label {
            font-size: 13px;
            color: var(--muted);
        }

        .nav-btns {
            display: flex;
            gap: 8px;
        }

        .nav-btns button,
        .action-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all .15s;
        }

        .nav-btns button:hover,
        .action-btn:hover {
            border-color: var(--accent);
            background: #1c2736;
        }

        .action-btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .action-btn.primary:hover {
            background: #79c0ff;
        }

        .action-btn.danger {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        /* MAIN LAYOUT */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* LEFT — 3D VIEWER */
        .viewer-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-width: 0;
        }

        .model-info {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .model-info .filename {
            font-size: 13px;
            color: var(--muted);
            font-family: monospace;
        }

        .model-info .idx {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }

        .model-info .size {
            font-size: 12px;
            color: var(--muted);
        }

        model-viewer {
            width: 100%;
            flex: 1;
            background: #1a1a2e;
            --poster-color: #1a1a2e;
        }

        .match-status {
            padding: 8px 16px;
            font-size: 13px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .match-status.matched {
            color: var(--green);
        }

        .match-status.unmatched {
            color: var(--orange);
        }

        /* RIGHT — REFERENCE + PICKER */
        .right-panel {
            width: 460px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tabs button.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-pane {
            display: none;
            flex: 1;
            overflow: auto;
            flex-direction: column;
        }

        .tab-pane.active {
            display: flex;
        }

        /* PRODUCT PICKER TAB */
        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .product-list {
            flex: 1;
            overflow-y: auto;
        }

        .product-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-item:hover {
            background: #1c2736;
        }

        .product-item.selected {
            background: #1a3a2a;
            border-left: 3px solid var(--green);
        }

        .product-item.already-matched {
            opacity: .45;
        }

        .product-item .name {
            font-size: 13px;
            font-weight: 500;
        }

        .product-item .meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .product-item .price {
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
            white-space: nowrap;
        }

        /* CATALOGUE TAB */
        .catalogue-images {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .catalogue-images img {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform .15s;
        }

        .catalogue-images img:hover {
            transform: scale(1.02);
        }

        /* IMAGE LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.show {
            display: flex;
        }

        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 8px;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .bottom-bar .stats {
            font-size: 13px;
            color: var(--muted);
        }

        .bottom-bar .actions {
            display: flex;
            gap: 8px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 999;
            transition: opacity .3s, transform .3s;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: var(--green);
            color: #000;
        }

        .toast.error {
            background: var(--red);
            color: #fff;
        }

        /* KEYBOARD HINT */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 11px;
            color: var(--muted);
            background: var(--bg);
            font-family: monospace;
            margin: 0 2px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🪑 LS <span>Model Matcher</span></h1>
        <div class="progress-bar">
            <div class="bar">
                <div class="bar-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span class="label" id="progressLabel">0 / 0 matched</span>
        </div>
        <div class="nav-btns">
            <button onclick="prevModel()" title="Previous model">◀ Prev</button>
            <button onclick="nextModel()" title="Next model">Next ▶</button>
            <button onclick="skipToUnmatched()" title="Skip to next unmatched">⏭ Next Unmatched</button>
        </div>
    </div>

    <div class="main">
        <!-- LEFT: 3D Model Viewer -->
        <div class="viewer-panel">
            <div class="model-info">
                <span class="filename" id="modelFilename">Loading...</span>
                <span class="idx" id="modelIndex">0/0</span>
                <span class="size" id="modelSize"></span>
            </div>
            <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral"
                interaction-prompt="none" style="background:#1a1a2e;">
            </model-viewer>
            <div class="match-status unmatched" id="matchStatus">⏳ Not yet matched</div>
        </div>

        <!-- RIGHT: Reference + Picker -->
        <div class="right-panel">
            <div class="tabs">
                <button class="active" onclick="switchTab('products')">📋 Products</button>
                <button onclick="switchTab('catalogue')">📸 Catalogue</button>
                <button onclick="switchTab('pdf')">📄 PDF</button>
            </div>
            <div class="tab-content">
                <!-- Products Tab -->
                <div class="tab-pane active" id="tab-products">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search products by name, SKU, or category..."
                            oninput="filterProducts()">
                    </div>
                    <div class="product-list" id="productList"></div>
                </div>
                <!-- Catalogue Images Tab -->
                <div class="tab-pane" id="tab-catalogue">
                    <div class="catalogue-images" id="catalogueImages"></div>
                </div>
                <!-- PDF Tab -->
                <div class="tab-pane" id="tab-pdf">
                    <iframe id="pdfViewer" style="width:100%;height:100%;border:none;" src=""></iframe>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="stats" id="statsBar">
            Shortcuts: <span class="kbd">←</span><span class="kbd">→</span> navigate &nbsp; <span class="kbd">U</span>
            skip to unmatched &nbsp; <span class="kbd">S</span> save &nbsp; <span class="kbd">Esc</span> deselect
        </div>
        <div class="actions">
            <button class="action-btn" onclick="clearCurrentMatch()">✕ Clear Match</button>
            <button class="action-btn primary" onclick="saveMapping()">💾 Save Mapping</button>
            <button class="action-btn danger" onclick="executeRename()">🚀 Execute Rename</button>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="">
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let models = [];
        let products = [];
        let catalogueImages = [];
        let mapping = {};  // modelFilename → { sku, productName, newFilename }
        let currentIdx = 0;

        async function init() {
            try {
                [models, products, catalogueImages, mapping] = await Promise.all([
                    fetch('/api/models').then(r => r.json()),
                    fetch('/api/products').then(r => r.json()),
                    fetch('/api/catalogue-images').then(r => r.json()),
                    fetch('/api/mapping').then(r => r.json()).catch(() => ({})),
                ]);

                console.log(`Loaded: ${models.length} models, ${products.length} products, ${catalogueImages.length} images`);

                renderCatalogueImages();
                loadModel(0);
                renderProducts();
                updateProgress();

                // PDF viewer
                document.getElementById('pdfViewer').src = '/catalogue/LIFESTYLEFURNITUREPDF.pdf';

            } catch (err) {
                console.error('Init error:', err);
                showToast('Failed to load data: ' + err.message, 'error');
            }
        }

        function loadModel(idx) {
            if (idx < 0 || idx >= models.length) return;
            currentIdx = idx;
            const m = models[idx];
            const viewer = document.getElementById('viewer');
            viewer.src = `/models/${encodeURIComponent(m.filename)}`;

            document.getElementById('modelFilename').textContent = m.filename;
            document.getElementById('modelIndex').textContent = `${idx + 1} / ${models.length}`;
            document.getElementById('modelSize').textContent = `${m.sizeMB} MB`;

            // Update match status
            const status = document.getElementById('matchStatus');
            if (mapping[m.filename]) {
                status.className = 'match-status matched';
                status.textContent = `✅ Matched → [${mapping[m.filename].sku}] ${mapping[m.filename].productName}`;
            } else {
                status.className = 'match-status unmatched';
                status.textContent = '⏳ Not yet matched — select a product from the right panel';
            }

            renderProducts(); // update highlighting
        }

        function prevModel() { loadModel(currentIdx - 1); }
        function nextModel() { loadModel(currentIdx + 1); }

        function skipToUnmatched() {
            for (let i = currentIdx + 1; i < models.length; i++) {
                if (!mapping[models[i].filename]) { loadModel(i); return; }
            }
            for (let i = 0; i < currentIdx; i++) {
                if (!mapping[models[i].filename]) { loadModel(i); return; }
            }
            showToast('All models are matched! 🎉', 'success');
        }

        function renderProducts() {
            const list = document.getElementById('productList');
            const query = (document.getElementById('searchInput').value || '').toLowerCase();
            const currentModel = models[currentIdx]?.filename;
            const matchedSKUs = new Set(Object.values(mapping).map(m => m.sku));

            let html = '';
            products.forEach((p, i) => {
                const name = p['Product Name'] || '';
                const sku = p.SKU || '';
                const was = p['WAS Price'] || '';
                const now = p['NOW ONLY Price'] || '';
                const searchStr = `${name} ${sku}`.toLowerCase();
                if (query && !searchStr.includes(query)) return;

                const isSelected = mapping[currentModel]?.sku === sku;
                const isMatched = matchedSKUs.has(sku) && !isSelected;

                html += `<div class="product-item ${isSelected ? 'selected' : ''} ${isMatched ? 'already-matched' : ''}"
              onclick="selectProduct('${sku.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}')">
      <div>
        <div class="name">${name}</div>
        <div class="meta">SKU: ${sku}${isMatched ? ' • (already assigned)' : ''}</div>
      </div>
      <div class="price">R${now || was || '?'}</div>
    </div>`;
            });
            list.innerHTML = html || '<div style="padding:20px;color:var(--muted);text-align:center;">No products match your search</div>';
        }

        function filterProducts() { renderProducts(); }

        function selectProduct(sku, productName) {
            const m = models[currentIdx];
            if (!m) return;

            // Generate a clean filename from SKU + product name
            const cleanName = productName.toLowerCase()
                .replace(/[^a-z0-9 ]/g, '')
                .replace(/\s+/g, '_')
                .substring(0, 50);
            const newFilename = `${sku.toLowerCase().replace(/[^a-z0-9]/g, '')}_${cleanName}.glb`;

            mapping[m.filename] = { sku, productName, newFilename };
            loadModel(currentIdx); // refresh display
            updateProgress();
            showToast(`Matched → [${sku}] ${productName}`, 'success');
        }

        function clearCurrentMatch() {
            const m = models[currentIdx];
            if (!m || !mapping[m.filename]) return;
            delete mapping[m.filename];
            loadModel(currentIdx);
            updateProgress();
        }

        function updateProgress() {
            const matched = Object.keys(mapping).length;
            const total = models.length;
            const pct = total > 0 ? (matched / total * 100).toFixed(0) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = `${matched} / ${total} matched (${pct}%)`;
        }

        function renderCatalogueImages() {
            const container = document.getElementById('catalogueImages');
            container.innerHTML = catalogueImages.map(img =>
                `<img src="/catalogue/${encodeURIComponent(img)}" alt="${img}" onclick="openLightbox('/catalogue/${encodeURIComponent(img)}')" loading="lazy">`
            ).join('');
        }

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('show');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        async function saveMapping() {
            try {
                const res = await fetch('/api/mapping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(mapping),
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`Mapping saved! (${data.count} entries)`, 'success');
                } else {
                    showToast('Save failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (err) {
                showToast('Save error: ' + err.message, 'error');
            }
        }

        async function executeRename() {
            const count = Object.keys(mapping).length;
            if (!count) { showToast('No mappings to execute', 'error'); return; }
            if (!confirm(`This will rename ${count} model files. Continue?`)) return;

            try {
                // Save first
                await fetch('/api/mapping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(mapping),
                });

                const res = await fetch('/api/execute-rename', { method: 'POST' });
                const data = await res.json();
                const renamed = data.results.filter(r => r.status === 'renamed').length;
                const failed = data.results.filter(r => r.status !== 'renamed').length;
                showToast(`Renamed: ${renamed} | Skipped: ${failed}`, renamed > 0 ? 'success' : 'error');
                console.log('Rename results:', data.results);
            } catch (err) {
                showToast('Rename error: ' + err.message, 'error');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') prevModel();
            if (e.key === 'ArrowRight') nextModel();
            if (e.key === 'u' || e.key === 'U') skipToUnmatched();
            if (e.key === 's' || e.key === 'S') saveMapping();
            if (e.key === 'Escape') { clearCurrentMatch(); closeLightbox(); }
        });

        init();
    </script>
</body>

</html>
